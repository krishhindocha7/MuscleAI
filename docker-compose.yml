services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: muscleai_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./server:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg15
    container_name: muscleai_postgres
    environment:
      POSTGRES_USER: muscle_ai
      POSTGRES_PASSWORD: password
      POSTGRES_DB: muscle_ai_db
    ports:
      - "5432:5432"
    volumes:
      - muscleai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muscle_ai -d muscle_ai_db"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  muscleai_postgres_data: